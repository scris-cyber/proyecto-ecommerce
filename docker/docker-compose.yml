version: '3.8'

services:
  spark-master:
    image: bde2020/spark-master:3.1.1-hadoop3.2
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ../src:/app/src
      - ../ontology:/app/ontology
    environment:
      - INIT_DAEMON=false
      - SPARK_CORE_CONF_spark_authenticate=true
      - SPARK_CORE_CONF_spark_authenticate_secret=CybersecurityTEC2026!
      - SPARK_CORE_CONF_spark_network_crypto_enabled=true
      - SPARK_CORE_CONF_spark_io_encryption_enabled=true

  spark-worker:
    image: bde2020/spark-worker:3.1.1-hadoop3.2
    container_name: spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ../src:/app/src
      - ../ontology:/app/ontology
    environment:
      - "SPARK_MASTER=spark://spark-master:7077"
      - SPARK_CORE_CONF_spark_authenticate=true
      - SPARK_CORE_CONF_spark_authenticate_secret=CybersecurityTEC2026!
      - SPARK_CORE_CONF_spark_network_crypto_enabled=true
      - SPARK_CORE_CONF_spark_io_encryption_enabled=true

  postgres-output:
    image: postgres:15
    container_name: postgres-output
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=app_analytics
      - POSTGRES_PASSWORD=SecureAnalytics2026!
      - POSTGRES_DB=ecommerce_analytics
    volumes:
      - ../database:/docker-entrypoint-initdb.d